name: Pages deploy diagnostic

# Diagnostic: deploy a single trivial file (no site code at all) to prove
# whether the Pages publish backend works. Dispatch-only.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-pages-actions
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Make a one-file site
        run: |
          mkdir -p _diag
          printf '<!doctype html><meta charset=utf-8><h1>diag ok</h1>' > _diag/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _diag
      - id: deployment
        uses: actions/deploy-pages@v4
